<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animals</title>

  <!-- Compiled Bootstrap CSS -->
  <link rel="stylesheet" href="css/bootstrap.css" />
  <!-- Your custom styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container py-5">
    <!-- Header with title and theme toggle -->
    <div class="d-flex justify-content-between align-items-center mb-5">
      <h1 class="fw-bold">Animals</h1>

      <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-secondary theme-btn active" data-theme="dark">Dark</button>
        <button type="button" class="btn btn-outline-secondary theme-btn" data-theme="light">Light</button>
      </div>
    </div>

    <!-- Search bar + category pills -->
    <div class="row g-4 mb-5 align-items-center">
      <div class="col-md-5">
       <input 
           type="search" 
           class="form-control form-control-lg" 
         placeholder="Search Animals" 
         />
      </div>

      <div class="col-md-7">
        <ul class="nav nav-pills justify-content-start justify-content-md-end flex-wrap gap-2">
          <li class="nav-item"><a class="nav-link" href="#">Adaptations</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Behavior</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Conservation</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Diversity</a></li>
        </ul>
      </div>
    </div>

    <!-- Animal cards with your local images -->
    <div class="row justify-content-center g-5">
      <!-- Penguin -->
<div class="col-12 col-sm-6 col-lg-4">
  <div class="animal-card">
    <div class="animal-img-wrapper">
      <img src="penguins.jpg" class="animal-img" alt="Penguins" />
    </div>
    <h5 class="animal-title mt-3">Penguins</h5>
  </div>
</div>

      <!-- Puppies -->
<div class="col-12 col-sm-6 col-lg-4">
  <div class="animal-card">
    <div class="animal-img-wrapper">
      <img src="puppies.webp" class="animal-img" alt="Puppies" />
    </div>
    <h5 class="animal-title mt-3">Puppies</h5>
  </div>
</div>
      <!-- Cat -->
<div class="col-12 col-sm-6 col-lg-4">
  <div class="animal-card">
    <div class="animal-img-wrapper">
      <img src="Cat.jpg" class="animal-img" alt="Cat" />
    </div>
    <h5 class="animal-title mt-3">Cat</h5>
  </div>
</div>
  </div>

  <!-- Bootstrap JS bundle -->
  <script src="js/bootstrap.bundle.min.js"></script>

  <!-- Theme toggle script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const html = document.documentElement;
      const buttons = document.querySelectorAll('.theme-btn');

      // Load saved theme or default to dark
      let currentTheme = localStorage.getItem('theme') || 'dark';
      html.setAttribute('data-bs-theme', currentTheme);

      // Highlight the correct button
      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === currentTheme);
      });

      // Handle button clicks
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          currentTheme = btn.dataset.theme;
          html.setAttribute('data-bs-theme', currentTheme);
          localStorage.setItem('theme', currentTheme);

          // Update active state
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
